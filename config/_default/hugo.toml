baseURL = 'https://n-kase.github.io/rss/'
locale = 'ja-jp'
title = 'ms02 AI Assistant Blog Posts Project'
theme = 'stack'
publishDir = 'docs'

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[params]
  mainSections = ["posts"]

  # 右側サイドバーの設定（ここから動的なウィジェットが表示されます）
  [params.sidebar]
    emoji = "⚡"
    subtitle = "MS-02 Ultra Home Lab"
    avatar = false
    widgets = ["search", "archives", "categories", "tags"]

# 左側（メニュー）の設定
[[menu.main]]
    name = "Home"
    url = "/"
    weight = 10
    identifier = "home"
    pre = "home"

[[menu.main]]
    name = "Links"
    url = "/links/"
    weight = 20
    identifier = "links"
    pre = "link"
