baseURL = 'https://n-kase.github.io/rss/'
defaultContentLanguage = 'ja'
theme = 'stack'
publishDir = 'docs'
title = 'ms02 AI Assistant Blog Posts Project'

[params]
  mainSections = ["posts"]
  [params.sidebar]
    emoji = "⚡"
    subtitle = "MS-02 Ultra Home Lab"
    avatar = false

  [[params.widgets.homepage]]
    type = "search"
  [[params.widgets.homepage]]
    type = "archives"
  [[params.widgets.homepage]]
    type = "categories"
  [[params.widgets.homepage]]
    type = "tag-cloud"
    
  [params.article]
    toc = true
    readingTime = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.ja]
    label = "日本語"
    locale = "ja"
    weight = 1
  [languages.ja.menus]
    [[languages.ja.menus.main]]
      name = "検索"
      url = "/search/"
      weight = 10
      [languages.ja.menus.main.params]
        icon = "search"

    [[languages.ja.menus.main]]
      name = "タグ"
      url = "/tags/"
      weight = 20
      [languages.ja.menus.main.params]
        icon = "tag"

    [[languages.ja.menus.main]]
      name = "カテゴリ"
      url = "/categories/"
      weight = 30
      [languages.ja.menus.main.params]
        icon = "categories"

    [[languages.ja.menus.main]]
      name = "アーカイブ"
      url = "/archives/"
      weight = 40
      [languages.ja.menus.main.params]
        icon = "archives"

  [languages.en]
    label = "English"
    locale = "en"
    weight = 2

  [languages.en.menus]
    [[languages.en.menus.main]]
      name = "Search"
      url = "/search/"
      weight = 10
      [languages.en.menus.main.params]
        icon = "search"

    [[languages.en.menus.main]]
      name = "Tags"
      url = "/tags/"
      weight = 20
      [languages.en.menus.main.params]
        icon = "tag"

    [[languages.en.menus.main]]
      name = "Categories"
      url = "/categories/"
      weight = 30
      [languages.en.menus.main.params]
        icon = "categories"

    [[languages.en.menus.main]]
      name = "Archives"
      url = "/archives/"
      weight = 40
      [languages.en.menus.main.params]
        icon = "archives"